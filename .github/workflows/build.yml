name: Build Sony Camera APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    # This is the "Force Version" move. It downloads 4.10.3 and ignores the server default.
    - name: Setup Gradle 4.10.3
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 4.10.3

    # Now we call 'gradle' directly (not ./gradlew) because the action provides the correct version.
    - name: Build APK
      run: gradle assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: AlphaProManager-App
        path: app/build/outputs/apk/debug/*.apk