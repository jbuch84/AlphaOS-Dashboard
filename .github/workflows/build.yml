name: Build Sony Camera APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    # This is the "Total Isolation" move: 
    # We clear the server's pre-installed SDK path so it doesn't find the broken "34x" files.
    - name: Clear Poisoned SDK Path
      run: echo "ANDROID_HOME=" >> $GITHUB_ENV

    - name: Setup Gradle 4.10.3
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 4.10.3

    - name: Build APK
      run: |
        gradle wrapper --gradle-version 4.10.3
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: AlphaProManager-App
        path: app/build/outputs/apk/debug/*.apk