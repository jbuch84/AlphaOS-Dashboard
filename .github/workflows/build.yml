name: Build Sony Camera APK

on: 
  workflow_dispatch:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    # Step A: Install the actual Gradle software
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 4.10.3

    # Step B: Create the actual gradlew file from scratch
    - name: Generate Wrapper
      run: gradle wrapper --gradle-version 4.10.3

    # Step C: NOW give it permission (This is the fix!)
    - name: Make Gradle Executable
      run: chmod +x gradlew

    # Step D: Compile (Notice we removed the './' before gradlew here)
    - name: Compile the APK
      run: ./gradlew assembleDebug

    - name: Upload the Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: AlphaProManager-App
        path: app/build/outputs/apk/debug/*.apk