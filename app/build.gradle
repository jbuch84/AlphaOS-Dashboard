apply plugin: 'com.android.application'

android {
    compileSdkVersion 25
    buildToolsVersion "25.0.2"

    defaultConfig {
        applicationId "com.github.ma1co.pmcademo.app"
        minSdkVersion 10
        targetSdkVersion 10
        versionCode 1
        versionName "1.0"
        setProperty("archivesBaseName", "AlphaProManager")
    }
}

dependencies {
    // These must use the ":" instead of "-" for JitPack to find them
    implementation 'com.github.ma1co:OpenMemories-Framework:master-SNAPSHOT'
    compileOnly 'com.github.ma1co:OpenMemories-Framework:master-SNAPSHOT'
    
    // This must be the 2.3.1 version for the 'newFixedLengthResponse' command to work
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
}