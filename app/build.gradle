apply plugin: 'com.android.application'

android {
    compileSdkVersion 25
    buildToolsVersion "25.0.2"

    defaultConfig {
        applicationId "com.github.ma1co.pmcademo.app"
        minSdkVersion 10
        targetSdkVersion 10
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'com.github.ma1co:OpenMemories-Framework:0.4.0'
    compileOnly 'com.github.ma1co:OpenMemories-Framework:0.4.0'
    implementation 'org.nanohttpd:nanohttpd:2.3.1'
}