<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Pro Dashboard</title>
    <style>
        :root { --sony-orange: #ff4500; --bg-dark: #121212; --card-bg: #1e1e1e; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-dark); color: var(--text); margin: 0; padding: 20px; }
        
        /* Dashboard Header */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--sony-orange); padding-bottom: 15px; margin-bottom: 20px; }
        .telemetry { display: flex; gap: 15px; font-family: monospace; font-size: 0.9rem; color: #aaa; background: #222; padding: 8px 15px; border-radius: 6px; border: 1px solid #333; }
        .telemetry span { color: var(--text); font-weight: bold; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #1a1a1a; padding: 15px; border-radius: 8px; border: 1px solid #333; align-items: center; }
        .btn { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn:hover { border-color: #888; }
        .btn-orange { background: var(--sony-orange); border: none; }
        .btn-orange:hover { background: #e03e00; }
        
        /* Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .item-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; border: 1px solid #333; position: relative; transition: 0.2s; }
        .item-card.selected { border-color: var(--sony-orange); box-shadow: 0 0 10px rgba(255, 69, 0, 0.3); }
        
        .preview { height: 140px; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .preview img { width: 100%; height: 100%; object-fit: cover; }
        .vid-icon { font-size: 3rem; opacity: 0.6; }
        
        .sel-box { position: absolute; top: 8px; left: 8px; width: 22px; height: 22px; cursor: pointer; z-index: 10; accent-color: var(--sony-orange); }
        .file-info { padding: 8px; font-size: 0.75rem; text-align: center; font-family: monospace; border-top: 1px solid #222; color: #aaa; }
        .file-info strong { color: var(--text); display: block; margin-bottom: 2px; }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 30px; padding-top: 20px; border-top: 1px solid #333; }
        
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        #lightbox img { max-width: 90%; max-height: 80%; border: 2px solid #444; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="lightbox" onclick="if(event.target === this) this.style.display='none'">
    <img id="lb-img">
    <button class="btn btn-orange" id="lb-dl-btn" style="padding: 12px 30px; font-size: 1.1rem; border-radius: 30px;">⬇ Download High-Res</button>
</div>

<header>
    <h1 style="margin:0; font-size:1.5rem;">Alpha OS Dashboard</h1>
    <div class="telemetry">
        <div>SD Card Free: <span id="sd-space">-- GB</span></div>
        <div id="selection-stats" style="color:var(--sony-orange); margin-left:15px;">0 Selected</div>
    </div>
</header>

<div class="controls">
    <button class="btn" onclick="toggleSelectAll()">☑ Select All (This Page)</button>
    <button class="btn btn-orange" onclick="downloadSelected()">⬇ Download Selected</button>
    <div style="margin-left:auto; font-size:0.9rem; color:#888;">
        Showing <span id="page-indicator" style="color:white; font-weight:bold;">1 - 50</span> of <span id="total-indicator">...</span>
    </div>
</div>

<div id="main-grid" class="gallery-grid">Loading camera hardware...</div>

<div class="pagination">
    <button class="btn" id="btn-prev" onclick="changePage(-1)" disabled>◄ Previous 50</button>
    <button class="btn" id="btn-next" onclick="changePage(1)">Next 50 ►</button>
</div>

<script>
    let currentOffset = 0;
    const LIMIT = 50;
    let totalFiles = 0;
    let selectedFiles = new Set();
    let currentPageFiles = [];

    async function initDashboard() {
        // Fetch Hardware Telemetry
        try {
            const sysResp = await fetch('/api/system');
            const sysData = await sysResp.json();
            document.getElementById('sd-space').textContent = `${sysData.storage_gb} GB`;
        } catch(e) { console.log("Telemetry unavailable"); }
        
        loadPage();
    }

    async function loadPage() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '<div style="color:#888;">Querying camera API...</div>';
        
        try {
            const resp = await fetch(`/api/files?offset=${currentOffset}&limit=${LIMIT}`);
            const data = await resp.json();
            
            totalFiles = data.total;
            currentPageFiles = data.files;
            
            document.getElementById('total-indicator').textContent = totalFiles;
            document.getElementById('page-indicator').textContent = `${currentOffset + 1} - ${Math.min(currentOffset + LIMIT, totalFiles)}`;
            
            document.getElementById('btn-prev').disabled = currentOffset === 0;
            document.getElementById('btn-next').disabled = currentOffset + LIMIT >= totalFiles;

            renderGrid();
        } catch (e) {
            grid.innerHTML = `<div style="color:#ff6b6b;">Error connecting to API.</div>`;
        }
    }

    function changePage(direction) {
        currentOffset += (direction * LIMIT);
        if (currentOffset < 0) currentOffset = 0;
        loadPage();
    }

    function renderGrid() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = '';

        currentPageFiles.forEach(file => {
            const card = document.createElement('div');
            card.className = 'item-card';
            const isImg = file.name.toUpperCase().endsWith('.JPG');
            const dateStr = new Date(file.date).toLocaleDateString();
            const sizeMB = (file.size / (1024*1024)).toFixed(1);
            
            if (selectedFiles.has(file.name)) card.classList.add('selected');

            card.innerHTML = `
                <input type="checkbox" class="sel-box" data-name="${file.name}" ${selectedFiles.has(file.name) ? 'checked' : ''}>
                <div class="preview">
                    ${isImg ? `<img src="/thumb/${file.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'vid-icon\\'>📷</div>'">` : `<div class="vid-icon">🎬</div>`}
                </div>
                <div class="file-info">
                    <strong>${file.name}</strong>
                    ${dateStr} &bull; ${sizeMB} MB
                </div>
            `;
            
            card.querySelector('.preview').onclick = (e) => {
                if(e.target.classList.contains('sel-box')) return;
                if(isImg) {
                    document.getElementById('lb-img').src = `/full/${file.name}`;
                    document.getElementById('lb-dl-btn').onclick = () => downloadOne(`/full/${file.name}`, file.name);
                    document.getElementById('lightbox').style.display = 'flex';
                } else {
                    window.open(`/full/${file.name}`, '_blank'); // Open video in new tab
                }
            };

            card.querySelector('.sel-box').onchange = (e) => {
                if (e.target.checked) selectedFiles.add(file.name);
                else selectedFiles.delete(file.name);
                card.classList.toggle('selected', e.target.checked);
                updateStats();
            };

            grid.appendChild(card);
        });
    }

    function updateStats() {
        document.getElementById('selection-stats').textContent = `${selectedFiles.size} Selected`;
    }

    function toggleSelectAll() {
        const checkboxes = document.querySelectorAll('.sel-box');
        const cards = document.querySelectorAll('.item-card');
        
        let allSelected = true;
        checkboxes.forEach(cb => { if (!cb.checked) allSelected = false; });

        checkboxes.forEach((cb, i) => {
            const name = cb.dataset.name;
            cb.checked = !allSelected;
            if (!allSelected) {
                selectedFiles.add(name);
                cards[i].classList.add('selected');
            } else {
                selectedFiles.delete(name);
                cards[i].classList.remove('selected');
            }
        });
        updateStats();
    }

    function downloadOne(url, name) {
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    async function downloadSelected() {
        const files = Array.from(selectedFiles);
        if (files.length === 0) return alert("Please select at least one file.");
        if (!confirm(`Download ${files.length} files sequentially?\n(Do not close this tab)`)) return;

        const btn = document.querySelector('.btn-orange[onclick="downloadSelected()"]');
        const originalText = btn.textContent;

        for (let i = 0; i < files.length; i++) {
            btn.textContent = `Downloading ${i+1} of ${files.length}...`;
            downloadOne(`/full/${files[i]}`, files[i]);
            await new Promise(r => setTimeout(r, 1500)); 
        }
        
        btn.textContent = originalText;
        alert("Batch download complete!");
    }

    initDashboard();
</script>
</body>
</html>
