<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alpha OS Dashboard</title>
    <style>
        :root { --bg-dark: #0a0a0a; --bg-panel: #1a1a1a; --accent: #ff5000; --text-main: #ffffff; --text-muted: #888888; }
        body { margin: 0; font-family: sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 40px; }
        header { background-color: var(--bg-panel); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; }
        .sys-info { font-size: 12px; color: var(--accent); font-weight: bold; }
        .toolbar { position: sticky; top: 0; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); padding: 10px 20px; z-index: 100; border-bottom: 1px solid #222; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; background: #111; padding: 4px; border-radius: 8px; }
        .btn { background: none; border: none; color: #666; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn.active { background: #333; color: var(--accent); }
        .action-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .action-btn:disabled { background: #222; color: #444; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--bg-panel); border-radius: 10px; overflow: hidden; position: relative; border: 2px solid transparent; transition: 0.2s; }
        .card.selected { border-color: var(--accent); }
        .card img { width: 100%; height: 140px; object-fit: cover; cursor: pointer; }
        .card-info { padding: 10px; font-size: 11px; display: flex; justify-content: space-between; color: #888; }
        .sel-indicator { position: absolute; top: 8px; left: 8px; width: 18px; height: 18px; border: 2px solid white; border-radius: 4px; background: rgba(0,0,0,0.5); pointer-events: none; }
        .card.selected .sel-indicator { background: var(--accent); border-color: var(--accent); }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #lightbox img { max-width: 95%; max-height: 80vh; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 30px; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h3 style="margin:0">ALPHA OS</h3>
        <div class="sys-info" id="sys-info">Syncing...</div>
    </header>

    <div class="toolbar">
        <div class="row">
            <div class="btn-group" id="mode-toggle">
                <button class="btn active" onclick="setMode('DCIM')">ORIGINALS</button>
                <button class="btn" id="recipe-btn" onclick="setMode('GRADED')" style="display:none">RECIPES</button>
            </div>
            <div class="btn-group">
                <button class="btn active" id="f-all" onclick="setFilter('all')">ALL</button>
                <button class="btn" id="f-today" onclick="setFilter('today')">TODAY</button>
            </div>
        </div>
        <div class="row">
            <span id="sel-count" style="font-size:12px; color:#555">0 selected</span>
            <button class="action-btn" id="dl-btn" disabled onclick="downloadSelected()">Download</button>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <img id="lb-img" src="">
        <div id="lb-meta" style="margin-top:15px; color:var(--accent); font-family:monospace;"></div>
    </div>

    <script>
        let currentFiles = [];
        let selected = new Set();
        let mode = 'DCIM';
        let filter = 'all';

        async function init() {
            const res = await fetch('/api/system');
            const sys = await res.json();
            document.getElementById('sys-info').innerText = `${sys.storage_gb}GB FREE`;
            if(sys.has_graded) document.getElementById('recipe-btn').style.display = 'block';
            loadFiles();
        }

        async function loadFiles() {
            document.getElementById('gallery').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px;">Reading SD Card...</div>';
            const res = await fetch(`/api/files?folder=${mode}`);
            const data = await res.json();
            currentFiles = data.files;
            selected.clear();
            render();
        }

        function setMode(m) {
            mode = m;
            document.querySelectorAll('#mode-toggle .btn').forEach(b => b.classList.toggle('active', b.innerText.includes(m)));
            loadFiles();
        }

        function setFilter(f) {
            filter = f;
            document.getElementById('f-all').classList.toggle('active', f === 'all');
            document.getElementById('f-today').classList.toggle('active', f === 'today');
            render();
        }

        function render() {
            const container = document.getElementById('gallery');
            container.innerHTML = '';
            
            const now = new Date();
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

            const filtered = currentFiles.filter(f => filter === 'all' || f.date >= startOfToday);

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = `card ${selected.has(f.name) ? 'selected' : ''}`;
                // If in GRADED mode, we load the full image as thumb since there are no thumbnails
                const thumbSrc = mode === 'GRADED' ? `/full/${f.name}` : `/thumb/${f.name}`;
                
                card.innerHTML = `
                    <div class="sel-indicator"></div>
                    <img src="${thumbSrc}" onclick="event.stopPropagation(); openLightbox('${f.name}')">
                    <div class="card-info" onclick="toggleSel('${f.name}')">
                        <span>${f.name}</span>
                        <span>${(f.size/1024/1024).toFixed(1)}MB</span>
                    </div>
                `;
                card.onclick = () => toggleSel(f.name);
                container.appendChild(card);
            });
            updateUI();
        }

        function toggleSel(name) {
            if(selected.has(name)) selected.delete(name);
            else selected.add(name);
            render();
        }

        function updateUI() {
            document.getElementById('sel-count').innerText = `${selected.size} selected`;
            document.getElementById('dl-btn').disabled = selected.size === 0;
        }

        function openLightbox(name) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lb-img').src = `/full/${name}`;
            document.getElementById('lb-meta').innerText = mode === 'DCIM' ? "Reading Metadata..." : "Recipe (No EXIF)";
            lb.style.display = 'flex';
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        async function downloadSelected() {
            const list = Array.from(selected);
            for(let name of list) {
                const link = document.createElement('a');
                link.href = `/full/${name}`;
                link.download = name;
                link.click();
                await new Promise(r => setTimeout(r, 1000));
            }
        }

        init();
    </script>
</body>
</html>
