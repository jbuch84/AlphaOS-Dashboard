<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alpha OS Dashboard</title>
    <style>
        /* SONY ALPHA THEME - UPDATED */
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #1a1a1a;
            --accent: #ff5000;
            --graded: #00ffcc; /* Cyan for Graded Badge */
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding-bottom: 40px;
        }

        header {
            background-color: var(--bg-panel);
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a2a;
        }

        h2 { margin: 0; font-weight: 700; letter-spacing: 0.5px; font-size: 22px; }
        .sys-info { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; background: rgba(255, 80, 0, 0.1); padding: 6px 12px; border-radius: 20px; }

        .toolbar {
            position: sticky;
            top: 0;
            background-color: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 25px;
            display: flex;
            flex-direction: column; /* Stacked for more controls */
            gap: 15px;
            z-index: 100;
            border-bottom: 1px solid #222;
        }

        .filter-row { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .filter-group { display: flex; gap: 6px; background: #1a1a1a; padding: 5px; border-radius: 10px; border: 1px solid #333; }
        .filter-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
        .filter-btn.active { background: #333; color: var(--accent); }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding: 25px; }
        
        .photo-card { background: var(--bg-panel); border-radius: 12px; overflow: hidden; position: relative; border: 2px solid transparent; transition: all 0.3s ease; animation: fadeInUp 0.4s ease forwards; opacity: 0; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        
        .photo-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .photo-card.selected { border-color: var(--accent); }

        /* SOURCE BADGES */
        .source-badge { position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; z-index: 5; }
        .badge-graded { background: var(--graded); color: #000; }
        .badge-dcim { background: #444; color: #fff; }

        .photo-img { width: 100%; height: 160px; object-fit: cover; display: block; cursor: pointer; }
        .photo-meta { padding: 12px 15px; font-size: 13px; color: var(--text-muted); display: flex; flex-direction: column; gap: 4px; }
        .meta-main { display: flex; justify-content: space-between; font-weight: 600; color: #eee; }

        .action-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .action-btn:disabled { background: #333; color: #666; }

        /* Lightbox */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #lightbox-img { max-width: 90%; max-height: 70vh; border-radius: 4px; }
        .close-btn { position: fixed; top: 30px; right: 30px; color: white; font-size: 40px; cursor: pointer; }

        #loading { text-align: center; padding: 60px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <h2>ALPHA OS DASHBOARD</h2>
        <div class="sys-info" id="sys-info">Syncing...</div>
    </header>

    <div class="toolbar">
        <div class="filter-row">
            <div class="filter-group" id="folder-filters">
                <button class="filter-btn active" data-folder="all">All Storage</button>
                <button class="filter-btn" data-folder="GRADED">Recipes</button>
                <button class="filter-btn" data-folder="DCIM">Originals</button>
            </div>
            
            <div class="filter-group" id="time-filters">
                <button class="filter-btn active" data-filter="all">Anytime</button>
                <button class="filter-btn" data-filter="today">Today</button>
            </div>
        </div>

        <div class="filter-row">
            <span id="selection-count">0 selected</span>
            <div style="display:flex; gap:10px;">
                <button class="action-btn" id="download-btn" disabled>Download Selected</button>
            </div>
        </div>
    </div>

    <div id="loading">Initial hardware handshake...</div>
    <div class="gallery" id="gallery"></div>

    <div id="lightbox">
        <div class="close-btn" onclick="closeLightbox()">&times;</div>
        <img id="lightbox-img" src="">
        <div id="lb-exif" style="margin-top:20px; color:var(--accent); font-family:monospace;"></div>
    </div>

    <script>
        let allFiles = [];
        let selectedFiles = new Set();
        let currentFilter = 'all';
        let currentFolder = 'all';

        async function init() {
            await fetchAllFiles();
            setInterval(fetchSystemInfo, 5000);
        }

        async function fetchSystemInfo() {
            try {
                const res = await fetch('/api/system');
                const data = await res.json();
                document.getElementById('sys-info').innerText = `${data.storage_gb}GB FREE • ${allFiles.length} PHOTOS`;
            } catch (e) {}
        }

        async function fetchAllFiles() {
            try {
                const res = await fetch(`/api/files?limit=500`); // Assuming server combines results
                const data = await res.json();
                allFiles = data.files.sort((a,b) => b.date - a.date);
                renderGallery();
                document.getElementById('loading').style.display = 'none';
            } catch (e) {
                document.getElementById('loading').innerText = "Camera Connection Lost";
            }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            const filtered = allFiles.filter(f => {
                const folderMatch = (currentFolder === 'all' || f.folder === currentFolder);
                // Time filtering logic here...
                return folderMatch;
            });

            filtered.forEach(file => {
                const isGraded = file.folder === 'GRADED';
                const card = document.createElement('div');
                card.className = `photo-card ${selectedFiles.has(file.name) ? 'selected' : ''}`;
                card.innerHTML = `
                    <div class="source-badge ${isGraded ? 'badge-graded' : 'badge-dcim'}">${file.folder}</div>
                    <img class="photo-img" src="/thumb/${file.name}" onclick="openLightbox('${file.name}')">
                    <div class="photo-meta">
                        <div class="meta-main">
                            <span>${file.name}</span>
                            <span style="color:var(--accent)">${(file.size/1024/1024).toFixed(1)}MB</span>
                        </div>
                        <div style="font-size:11px">${new Date(file.date).toLocaleString()}</div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        // Logic for Filter Clicks
        document.getElementById('folder-filters').addEventListener('click', (e) => {
            if(!e.target.dataset.folder) return;
            document.querySelectorAll('#folder-filters .filter-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentFolder = e.target.dataset.folder;
            renderGallery();
        });

        async function openLightbox(name) {
            const file = allFiles.find(f => f.name === name);
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = `/full/${name}`;
            lb.style.display = 'flex';
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        init();
    </script>
</body>
</html>
