<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alpha OS Dashboard</title>
    <style>
        :root { --bg-dark: #0a0a0a; --bg-panel: #1a1a1a; --accent: #ff5000; --text-main: #ffffff; --text-muted: #888888; }
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 40px; }
        header { background-color: var(--bg-panel); padding: 15px 25px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
        .sys-info { font-size: 12px; color: var(--accent); font-weight: bold; background: rgba(255,80,0,0.1); padding: 5px 10px; border-radius: 15px; }
        .toolbar { position: sticky; top: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); padding: 10px 20px; z-index: 100; border-bottom: 1px solid #222; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .btn-group { display: flex; gap: 5px; background: #111; padding: 4px; border-radius: 8px; border: 1px solid #333; }
        .btn { background: none; border: none; color: #888; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; }
        .btn.active { background: var(--accent); color: white; box-shadow: 0 0 15px rgba(255,80,0,0.3); }
        .action-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .action-btn:disabled { background: #222; color: #444; }
        .secondary-btn { background: #222; border: 1px solid #444; color: #aaa; margin-right: 10px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: var(--bg-panel); border-radius: 10px; overflow: hidden; position: relative; border: 2px solid transparent; transition: 0.2s; }
        .card.selected { border-color: var(--accent); }
        .card img { width: 100%; height: 140px; object-fit: cover; cursor: pointer; background: #000; }
        .card-info { padding: 10px; font-size: 11px; display: flex; justify-content: space-between; color: #888; }
        .checkbox-hitbox { position: absolute; top: 0; left: 0; width: 60px; height: 60px; cursor: pointer; z-index: 10; }
        .sel-indicator { position: absolute; top: 10px; left: 10px; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5); border-radius: 5px; background: rgba(0,0,0,0.4); pointer-events: none; }
        .card.selected .sel-indicator { background: var(--accent); border-color: var(--accent); }
        .card.selected .sel-indicator::after { content: '✓'; color: white; font-size: 12px; position: absolute; left: 4px; top: 0px; font-weight: bold; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; cursor: zoom-out; }
        #lightbox img { max-width: 85%; max-height: 65vh; border-radius: 4px; transition: transform 0.4s; cursor: default; }
        .lb-tools { margin-top: 20px; display: flex; gap: 15px; background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; cursor: default; }
    </style>
</head>
<body>

    <header>
        <h3 style="margin:0">ALPHA OS DASHBOARD</h3>
        <div class="sys-info" id="sys-info">CONNECTING...</div>
    </header>

    <div class="toolbar">
        <div class="row">
            <div class="btn-group" id="mode-toggle">
                <button class="btn active" id="btn-DCIM" onclick="setMode('DCIM')">ORIGINALS</button>
                <button class="btn" id="btn-GRADED" onclick="setMode('GRADED')" style="display:none">RECIPES</button>
            </div>
            <div class="btn-group">
                <button class="btn active" id="f-all" onclick="setFilter('all')">ANYTIME</button>
                <button class="btn" id="f-today" onclick="setFilter('today')">TODAY</button>
            </div>
        </div>
        <div class="row">
            <span id="sel-count" style="font-size:12px; color:var(--text-muted)">0 selected</span>
            <div>
                <button class="action-btn secondary-btn" id="unsel-btn" style="display:none" onclick="unselectAll()">Unselect All</button>
                <button class="action-btn" id="dl-btn" disabled onclick="downloadSelected()">Download Selected</button>
            </div>
        </div>
    </div>

    <div class="gallery" id="gallery"></div>

    <div id="lightbox" onclick="closeLightbox()">
        <img id="lb-img" src="" onclick="event.stopPropagation()">
        <div id="lb-exif" style="margin-top:15px; color:var(--accent); font-family:monospace; font-weight:bold; text-align:center; max-width:90%"></div>
        <div class="lb-tools" onclick="event.stopPropagation()">
            <button class="action-btn" style="background:#222; border:1px solid #444;" onclick="rotatePreview()">ROTATE</button>
            <button class="action-btn" onclick="downloadCurrent()">SAVE IMAGE</button>
        </div>
    </div>

    <script>
        let currentFiles = [];
        let selected = new Set();
        let mode = 'DCIM';
        let filter = 'all';
        let rotation = 0;
        let viewName = "";
        let abortController = null;

        async function init() {
            const res = await fetch('/api/system');
            const sys = await res.json();
            document.getElementById('sys-info').innerText = `${sys.storage_gb}GB FREE`;
            if(sys.has_graded) document.getElementById('btn-GRADED').style.display = 'block';
            loadFiles();
        }

        async function loadFiles() {
            if (abortController) abortController.abort();
            abortController = new AbortController();
            document.getElementById('gallery').innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:100px; color:#555;">Handshaking...</div>';
            try {
                const res = await fetch(`/api/files?folder=${mode}`, { signal: abortController.signal });
                const data = await res.json();
                currentFiles = data.files;
                selected.clear();
                render();
            } catch (err) { if(err.name !== 'AbortError') console.error(err); }
        }

        function setMode(m) {
            mode = m;
            document.getElementById('btn-DCIM').classList.toggle('active', m === 'DCIM');
            document.getElementById('btn-GRADED').classList.toggle('active', m === 'GRADED');
            loadFiles();
        }

        function setFilter(f) {
            filter = f;
            document.getElementById('f-all').classList.toggle('active', f === 'all');
            document.getElementById('f-today').classList.toggle('active', f === 'today');
            render();
        }

        function render() {
            const container = document.getElementById('gallery');
            container.innerHTML = '';
            const now = new Date();
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const filtered = currentFiles.filter(f => filter === 'all' || f.date >= startOfToday);

            filtered.forEach(f => {
                const card = document.createElement('div');
                card.className = `card ${selected.has(f.name) ? 'selected' : ''}`;
                card.innerHTML = `
                    <div class="checkbox-hitbox" onclick="toggleSel(event, '${f.name}')"></div>
                    <div class="sel-indicator"></div>
                    <img src="/thumb/?folder=${mode}&name=${f.name}" onclick="openLightbox('${f.name}')">
                    <div class="card-info"><span>${f.name}</span><span>${(f.size/1024/1024).toFixed(1)}MB</span></div>
                `;
                container.appendChild(card);
            });
            updateUI();
        }

        function toggleSel(event, name) {
            event.stopPropagation();
            if(selected.has(name)) selected.delete(name);
            else selected.add(name);
            render();
        }

        function unselectAll() { selected.clear(); render(); }

        function updateUI() {
            document.getElementById('sel-count').innerText = `${selected.size} selected`;
            document.getElementById('dl-btn').disabled = selected.size === 0;
            document.getElementById('unsel-btn').style.display = selected.size > 0 ? 'inline-flex' : 'none';
        }

        function openLightbox(name) {
            viewName = name;
            rotation = 0;
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lb-img');
            img.src = `/full/?folder=${mode}&name=${name}`;
            img.style.transform = `rotate(0deg) scale(1)`;
            document.getElementById('lb-exif').innerText = "PARSING EXIF...";
            
            if(mode === 'DCIM') {
                parseMetadata(`/full/?folder=${mode}&name=${name}`);
            } else {
                document.getElementById('lb-exif').innerText = "FILM OS RECIPE • NO METADATA";
            }
            lb.style.display = 'flex';
        }

        async function parseMetadata(url) {
            try {
                const response = await fetch(url, { headers: { 'Range': 'bytes=0-65536' } });
                const buffer = await response.arrayBuffer();
                const view = new DataView(buffer);
                
                // Extremely basic Sony EXIF offset finder
                let info = "SONY ALPHA • DATA PRESERVED";
                let iso = "", aperture = "", shutter = "";

                // Look for common EXIF tags (Heuristic approach for the dashboard)
                for (let i = 0; i < buffer.byteLength - 4; i++) {
                    if (view.getUint16(i) === 0x8827) iso = "ISO " + view.getUint16(i+8); 
                }
                document.getElementById('lb-exif').innerText = iso ? `ORIGINAL DATA • ${iso}` : "SONY ALPHA • JPG DATA";
            } catch (e) { document.getElementById('lb-exif').innerText = "METADATA READ ERROR"; }
        }

        function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }

        function rotatePreview() {
            rotation = (rotation + 90) % 360;
            const scale = (rotation === 90 || rotation === 270) ? 0.65 : 1;
            document.getElementById('lb-img').style.transform = `rotate(${rotation}deg) scale(${scale})`;
        }

        function downloadCurrent() { triggerDownload(viewName); }

        async function downloadSelected() {
            const list = Array.from(selected);
            for(let name of list) {
                triggerDownload(name);
                await new Promise(r => setTimeout(r, 800));
            }
        }

        function triggerDownload(name) {
            const link = document.createElement('a');
            link.href = `/full/?folder=${mode}&name=${name}`;
            link.download = name;
            link.click();
        }

        init();
    </script>
</body>
</html>
