<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Alpha OS Dashboard</title>
    <style>
        /* Sony Alpha Theme */
        :root {
            --bg-dark: #0a0a0a;
            --bg-panel: #1a1a1a;
            --accent: #ff5000;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
        }

        header {
            background-color: var(--bg-panel);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2a2a2a;
        }

        h2 { margin: 0; font-weight: 600; letter-spacing: 0.5px; }
        .sys-info { font-size: 14px; color: var(--accent); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }

        .toolbar {
            position: sticky;
            top: 0;
            background-color: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .filter-group { display: flex; gap: 8px; background: #222; padding: 4px; border-radius: 8px; }
        .filter-btn { background: transparent; border: none; color: var(--text-muted); padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
        .filter-btn:hover { color: var(--text-main); }
        .filter-btn.active { background: #333; color: var(--accent); }

        .action-btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .action-btn:hover { background: #e04600; }
        .action-btn:disabled { background: #444; color: #888; cursor: not-allowed; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
        .photo-card { background: var(--bg-panel); border-radius: 8px; overflow: hidden; position: relative; border: 2px solid transparent; transition: transform 0.2s ease; }
        .photo-card:hover { transform: scale(1.02); }
        .photo-card.selected { border-color: var(--accent); }

        .photo-img { width: 100%; height: 150px; object-fit: cover; display: block; cursor: pointer; }
        .photo-meta { padding: 10px; font-size: 12px; color: var(--text-muted); display: flex; justify-content: space-between; }

        .select-box { position: absolute; top: 8px; left: 8px; width: 24px; height: 24px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.8); border-radius: 4px; cursor: pointer; z-index: 10; transition: all 0.2s; }
        .select-box:hover { border-color: var(--accent); }
        .photo-card.selected .select-box { background: var(--accent); border-color: var(--accent); }
        .photo-card.selected .select-box::after { content: '✓'; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 14px; }

        .load-more-container { text-align: center; padding: 20px; margin-bottom: 40px; }
        #load-more-btn { background: #222; color: white; border: 1px solid #444; padding: 12px 30px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: border-color 0.2s; }
        #load-more-btn:hover { border-color: var(--accent); }

        /* Lightbox & EXIF Telemetry */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        
        /* Transform transition added for smooth rotation */
        #lightbox-img { max-width: 90%; max-height: 70vh; border-radius: 4px; box-shadow: 0 4px 30px rgba(0,0,0,0.8); transition: transform 0.3s ease, filter 0.3s ease; }

        .lightbox-info-bar { margin-top: 15px; text-align: center; color: #ccc; font-size: 14px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 90%; }
        .lightbox-info-bar span { background: #222; padding: 6px 14px; border-radius: 4px; border: 1px solid #333; }
        
        .exif-data { color: var(--accent); font-family: monospace; font-size: 15px; }

        .lightbox-controls { margin-top: 20px; display: flex; gap: 15px; z-index: 1001; }
        
        /* Safari iOS UI Fix applied here */
        .close-btn { position: fixed; top: max(20px, env(safe-area-inset-top)); right: max(30px, env(safe-area-inset-right)); color: white; font-size: 40px; cursor: pointer; line-height: 1; z-index: 1001; }
        .close-btn:hover { color: var(--accent); }
        
        #loading { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <h2>ALPHA OS DASHBOARD</h2>
        <div class="sys-info" id="sys-info">Checking hardware...</div>
    </header>

    <div class="toolbar">
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="today">Today</button>
            <button class="filter-btn" data-filter="week">This Week</button>
            <button class="filter-btn" data-filter="month">This Month</button>
            <button class="filter-btn" data-filter="year">This Year</button>
        </div>
        <div>
            <span id="selection-count" style="margin-right: 15px; color: var(--text-muted);">0 selected</span>
            <button class="action-btn" id="download-btn" disabled>Download Selected</button>
        </div>
    </div>

    <div id="loading">Syncing camera database...</div>
    <div class="gallery" id="gallery"></div>
    
    <div class="load-more-container" id="load-more-container" style="display: none;">
        <button id="load-more-btn" onclick="loadMore()">Load More Photos</button>
    </div>

    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">×</span>
        <img id="lightbox-img" src="" alt="Full Preview">
        
        <div class="lightbox-info-bar" id="lightbox-info">
            <span id="lb-name"></span>
            <span id="lb-date"></span>
            <span id="lb-size"></span>
            <span class="exif-data" id="lb-exif">Reading Metadata...</span>
        </div>

        <div class="lightbox-controls">
            <button class="action-btn" onclick="rotatePreview()" style="background: #333;">Rotate 90°</button>
            <button class="action-btn" onclick="downloadLightboxImage()">Download Image</button>
        </div>
    </div>

    <script>
        let allFiles = [];
        let selectedFiles = new Set();
        let currentFilter = 'all';
        let currentlyViewingFile = null;
        let displayLimit = 50; 
        const displayChunkSize = 50;
        
        // --- NEW STATE VARIABLE FOR ROTATION ---
        let currentRotation = 0;

        // --- NATIVE OFFLINE EXIF PARSER ---
        function parseExif(view) {
            if (view.getUint16(0, false) !== 0xFFD8) return null; // Not a valid JPEG
            let offset = 2;
            let length = view.byteLength;
            let marker;
            
            while (offset < length) {
                if (view.getUint8(offset) !== 0xFF) break;
                marker = view.getUint8(offset + 1);
                if (marker === 0xE1) { // APP1 Marker (EXIF)
                    return extractTags(view, offset + 4);
                }
                offset += 2 + view.getUint16(offset + 2, false);
            }
            return null;
        }

        function extractTags(view, start) {
            if (view.getUint32(start, false) !== 0x45786966) return null; // 'Exif'
            const tiffOffset = start + 6;
            const littleEndian = view.getUint16(tiffOffset, false) === 0x4949;
            const ifd0Offset = view.getUint32(tiffOffset + 4, littleEndian);

            let subIfdOffset = 0;
            let entries = view.getUint16(tiffOffset + ifd0Offset, littleEndian);
            for (let i = 0; i < entries; i++) {
                let entryOffset = tiffOffset + ifd0Offset + 2 + (i * 12);
                let tag = view.getUint16(entryOffset, littleEndian);
                if (tag === 0x8769) { // ExifOffset Tag
                    subIfdOffset = view.getUint32(entryOffset + 8, littleEndian);
                    break;
                }
            }
            
            if (!subIfdOffset) return null;

            // Target Hex Tags: 829A (Shutter), 829D (Aperture), 8827 (ISO), 920A (Focal Length)
            const targetTags = { 0x829A: 'shutter', 0x829D: 'aperture', 0x8827: 'iso', 0x920A: 'focal' };
            let result = {};
            entries = view.getUint16(tiffOffset + subIfdOffset, littleEndian);

            for (let i = 0; i < entries; i++) {
                let entryOffset = tiffOffset + subIfdOffset + 2 + (i * 12);
                let tag = view.getUint16(entryOffset, littleEndian);
                
                if (targetTags[tag]) {
                    let type = view.getUint16(entryOffset + 2, littleEndian);
                    if (type === 3) { // SHORT
                        result[targetTags[tag]] = view.getUint16(entryOffset + 8, littleEndian);
                    } else if (type === 5) { // RATIONAL
                        let valueOffset = view.getUint32(entryOffset + 8, littleEndian);
                        let num = view.getUint32(tiffOffset + valueOffset, littleEndian);
                        let den = view.getUint32(tiffOffset + valueOffset + 4, littleEndian);
                        result[targetTags[tag]] = num / den;
                    }
                }
            }
            return result;
        }

        function formatExif(exif) {
            if (!exif || Object.keys(exif).length === 0) return "EXIF Unavailable";
            let fNum = exif.aperture ? `ƒ/${exif.aperture.toFixed(1)}` : 'ƒ/--';
            let shutter = exif.shutter ? `1/${Math.round(1/exif.shutter)}s` : '--s';
            let iso = exif.iso ? `ISO ${exif.iso}` : 'ISO --';
            let focal = exif.focal ? `${Math.round(exif.focal)}mm` : '--mm';
            return `${fNum} • ${shutter} • ${iso} • ${focal}`;
        }
        // -----------------------------------

        async function init() {
            fetchSystemInfo();
            await fetchAllFiles();
        }

        async function fetchSystemInfo() {
            try {
                const res = await fetch('/api/system');
                const data = await res.json();
                document.getElementById('sys-info').innerText = `SD CARD: ${data.storage_gb} GB FREE`;
            } catch (e) {
                document.getElementById('sys-info').innerText = "SYSTEM TELEMETRY UNAVAILABLE";
            }
        }

        async function fetchAllFiles() {
            let offset = 0;
            const limit = 50; 
            let keepFetching = true;
            
            while (keepFetching) {
                try {
                    const res = await fetch(`/api/files?offset=${offset}&limit=${limit}`);
                    const data = await res.json();
                    if (data.files && data.files.length > 0) {
                        allFiles = allFiles.concat(data.files);
                        offset += limit;
                        renderGallery(); 
                    } else {
                        keepFetching = false;
                    }
                    if (allFiles.length >= data.total) keepFetching = false;
                } catch (e) {
                    keepFetching = false;
                }
            }
            document.getElementById('loading').style.display = 'none';
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                displayLimit = displayChunkSize; 
                renderGallery();
            });
        });

        function getFilteredFiles() {
            if (currentFilter === 'all') return allFiles;
            const now = new Date();
            const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const startOfWeek = startOfToday - (now.getDay() * 24 * 60 * 60 * 1000);
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            const startOfYear = new Date(now.getFullYear(), 0, 1).getTime();

            return allFiles.filter(file => {
                switch(currentFilter) {
                    case 'today': return file.date >= startOfToday;
                    case 'week': return file.date >= startOfWeek;
                    case 'month': return file.date >= startOfMonth;
                    case 'year': return file.date >= startOfYear;
                    default: return true;
                }
            });
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            const filteredFiles = getFilteredFiles();
            const filesToShow = filteredFiles.slice(0, displayLimit);

            filesToShow.forEach(file => {
                const isSelected = selectedFiles.has(file.name);
                const sizeMB = (file.size / (1024 * 1024)).toFixed(1);
                
                const card = document.createElement('div');
                card.className = `photo-card ${isSelected ? 'selected' : ''}`;
                
                card.innerHTML = `
                    <div class="select-box" onclick="toggleSelection(event, '${file.name}')"></div>
                    <img class="photo-img" src="/thumb/${file.name}" loading="lazy" alt="Thumbnail" onclick="openLightbox('${file.name}')">
                    <div class="photo-meta">
                        <span>${file.name}</span>
                        <span>${sizeMB} MB</span>
                    </div>
                `;
                gallery.appendChild(card);
            });

            document.getElementById('load-more-container').style.display = (filteredFiles.length > displayLimit) ? 'block' : 'none';
        }

        function loadMore() {
            displayLimit += displayChunkSize;
            renderGallery();
        }

        function toggleSelection(event, fileName) {
            event.stopPropagation(); 
            const cardElement = event.target.parentElement;
            if (selectedFiles.has(fileName)) {
                selectedFiles.delete(fileName);
                cardElement.classList.remove('selected');
            } else {
                selectedFiles.add(fileName);
                cardElement.classList.add('selected');
            }
            updateDownloadButton();
        }

        function updateDownloadButton() {
            const btn = document.getElementById('download-btn');
            const countStr = document.getElementById('selection-count');
            const count = selectedFiles.size;
            countStr.innerText = `${count} selected`;
            btn.disabled = count === 0;
            btn.innerText = count > 0 ? `Download ${count} Files` : `Download Selected`;
        }

        // --- BACKGROUND CLICK FIX ADDED HERE ---
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLightbox();
            }
        });

        async function openLightbox(fileName) {
            currentlyViewingFile = allFiles.find(f => f.name === fileName);
            if (!currentlyViewingFile) return;

            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            
            // Reset rotation state on opening
            currentRotation = 0;
            img.style.transform = `rotate(0deg)`;
            
            const sizeMB = (currentlyViewingFile.size / (1024 * 1024)).toFixed(1);
            const dateObj = new Date(currentlyViewingFile.date);
            const dateStr = dateObj.toLocaleDateString() + ' ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            document.getElementById('lb-name').innerText = currentlyViewingFile.name;
            document.getElementById('lb-size').innerText = `${sizeMB} MB`;
            document.getElementById('lb-date').innerText = dateStr;
            document.getElementById('lb-exif').innerText = "Reading Metadata...";
            
            // Start with blurry thumbnail instantly
            img.src = `/thumb/${currentlyViewingFile.name}`;
            img.style.filter = "blur(10px)"; 
            lightbox.style.display = 'flex';

            const fullResUrl = `/full/${currentlyViewingFile.name}`;

            try {
                // Fetch the full file as a Blob once to save bandwidth
                const res = await fetch(fullResUrl);
                const blob = await res.blob();
                
                // 1. Display the high-res image
                img.src = URL.createObjectURL(blob);
                img.style.filter = "blur(0px)";

                // 2. Parse EXIF from the exact same Blob locally
                if (fileName.toLowerCase().endsWith('.jpg')) {
                    const buffer = await blob.arrayBuffer();
                    const view = new DataView(buffer);
                    const exifData = parseExif(view);
                    document.getElementById('lb-exif').innerText = formatExif(exifData);
                } else {
                    document.getElementById('lb-exif').innerText = "Video File";
                }
            } catch (err) {
                console.error("Image load error:", err);
                document.getElementById('lb-exif').innerText = "Read Error";
            }
        }

        // --- NEW ROTATION FUNCTION ---
        function rotatePreview() {
            currentRotation = (currentRotation + 90) % 360;
            document.getElementById('lightbox-img').style.transform = `rotate(${currentRotation}deg)`;
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            currentlyViewingFile = null;
            currentRotation = 0;
            document.getElementById('lightbox-img').style.transform = `rotate(0deg)`;
        }

        // --- CANVAS DOWNLOAD LOGIC INTEGRATION ---
        function downloadLightboxImage() {
            if (!currentlyViewingFile) return;
            
            if (currentRotation === 0) {
                // Normal download if no rotation applied
                triggerDownload(currentlyViewingFile.name);
                return;
            }

            // Create canvas for rotated download
            const img = document.getElementById('lightbox-img');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            if (currentRotation === 90 || currentRotation === 270) {
                canvas.width = img.naturalHeight;
                canvas.height = img.naturalWidth;
            } else {
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
            }

            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(currentRotation * Math.PI / 180);
            ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);

            const rotatedUrl = canvas.toDataURL('image/jpeg', 1.0);
            const link = document.createElement('a');
            link.href = rotatedUrl;
            link.download = "Rotated_" + currentlyViewingFile.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        document.getElementById('download-btn').addEventListener('click', async () => {
            const filesToDownload = Array.from(selectedFiles);
            const btn = document.getElementById('download-btn');
            
            for (let i = 0; i < filesToDownload.length; i++) {
                btn.innerText = `Downloading ${i + 1} of ${filesToDownload.length}...`;
                triggerDownload(filesToDownload[i]);
                await new Promise(r => setTimeout(r, 1500)); 
            }
            
            btn.innerText = "Download Complete!";
            setTimeout(() => {
                selectedFiles.clear();
                renderGallery();
                updateDownloadButton();
            }, 2000);
        });

        // Used by batch download and unrotated single downloads
        function triggerDownload(fileName) {
            const link = document.createElement('a');
            link.href = `/full/${fileName}`;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        init();
    </script>
</body>
</html>
